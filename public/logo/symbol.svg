<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 168" width="120" height="168">
  <!-- Tarot o Lásce — symbol: karta se srdcem, tokens v3 -->
  <defs>
    <style>
      .plum { fill: #2B1340; }
      .gold { stroke: #D4AF37; fill: none; }
    </style>
  </defs>
  <!-- tělo karty -->
  <rect class="plum" x="2" y="2" width="116" height="164" rx="14"/>
  <!-- zlatý vnitřní rámeček -->
  <rect class="gold" x="10" y="10" width="100" height="148" rx="9" stroke-width="2.5"/>
  <!-- hvězdička nahoře -->
  <path fill="#D4AF37" d="M60 24 l2.8 6.4 6.4 2.8 -6.4 2.8 -2.8 6.4 -2.8 -6.4 -6.4 -2.8 6.4 -2.8 z"/>
  <!-- srdce (romantic-pink, ladí s akcenty appky) -->
  <path fill="#E84D9A" stroke="#F6BBD9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
        d="M60 116 C 38 98, 30 84, 30 72 C 30 60, 39 52, 49 52 C 55 52, 59 55, 60 60 C 61 55, 65 52, 71 52 C 81 52, 90 60, 90 72 C 90 84, 82 98, 60 116 Z"/>
  <!-- hvězdička dole -->
  <path fill="#D4AF37" d="M60 130 l2.2 5 5 2.2 -5 2.2 -2.2 5 -2.2 -5 -5 -2.2 5 -2.2 z"/>
</svg>
